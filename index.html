<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="SwasthyeDip Foundation is preparing a nonprofit health website focused on community care, outreach, and wellness access.">
    <title>SwasthyeDip Foundation | Coming Soon</title>
    <link rel="canonical" href="https://swasthyedip.org.np/">
    <link rel="preload" href="assets/community-health-hero.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="site-shell">
      <section class="hero" aria-labelledby="notice-title">
        <img class="hero__image" src="assets/community-health-hero.png" alt="Community health volunteers helping people at an outreach clinic">
        <div class="hero__shade" aria-hidden="true"></div>

        <header class="topbar" aria-label="Site header">
          <a class="brand" href="#" aria-label="SwasthyeDip Foundation home">
            
            <span>
              <strong>SwasthyeDip</strong>
            </span>
          </a>
          <a class="topbar__link" href="mailto:info@swasthyedip.org.np">Contact us</a>
        </header>

        <section class="notice" aria-labelledby="notice-title">
          <div>
            <p class="eyebrow">Launch status</p>
            <h1 id="notice-title">Website in progress</h1>
            <p>For urgent collaboration, volunteering, or donation conversations, reach our team by email.</p>
          </div>
          <form class="signup" action="mailto:info@swasthyedip.org.np" method="post" enctype="text/plain">
            <label for="email">Get launch updates</label>
            <div class="signup__row">
              <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email">
              <button type="submit">Notify me</button>
            </div>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
